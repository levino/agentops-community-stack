# Traefik is the only public entry point: it binds 80/443 directly on the
# node via hostPort (single-node stack, no LoadBalancer available).
# The k3s-bundled Traefik and servicelb MUST be disabled at install time
# (see runbooks/bootstrap-from-zero.md).
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 1h
  url: https://traefik.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: kube-system
spec:
  interval: 1h
  chart:
    spec:
      chart: traefik
      version: '39.0.7'
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  values:
    api:
      dashboard: false
      insecure: false
    deployment:
      kind: DaemonSet
    service:
      # No LoadBalancer on a single node — Traefik is reached via hostPort.
      type: ClusterIP
    ports:
      web:
        hostPort: 80
        expose:
          default: true
      websecure:
        hostPort: 443
        expose:
          default: true
      traefik:
        expose:
          default: false
    securityContext:
      runAsNonRoot: false
      runAsUser: 0
      runAsGroup: 0
      capabilities:
        add:
          - NET_BIND_SERVICE
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 0
        maxUnavailable: 1
    providers:
      kubernetesCRD:
        enabled: true
        # Middlewares (e.g. the ForwardAuth pair in the `forwardauth`
        # namespace) are referenced from app namespaces.
        allowCrossNamespace: true
      kubernetesIngress:
        enabled: true
