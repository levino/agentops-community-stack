# The reusable ForwardAuth pair. Protect any ingress by annotating it with:
#   traefik.ingress.kubernetes.io/router.middlewares: >-
#     forwardauth-oauth-errors@kubernetescrd,forwardauth-forwardauth@kubernetescrd
# (Cross-namespace references require providers.kubernetesCRD.
# allowCrossNamespace=true — set in cluster/traefik/helmrelease.yaml.)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: forwardauth
  namespace: forwardauth
spec:
  forwardAuth:
    address: http://oauth2-proxy.forwardauth.svc.cluster.local/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Groups
      - Authorization
---
# Unauthenticated requests get a 401 from /oauth2/auth; this middleware
# turns that into the sign-in flow at the central IdP.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth-errors
  namespace: forwardauth
spec:
  errors:
    status:
      - "401-403"
    statusRewrites:
      "401": 302
    service:
      name: oauth2-proxy
      namespace: forwardauth
      port: 80
    query: "/oauth2/sign_in?rd={url}"
