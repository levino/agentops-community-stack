apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - sealed-zitadel-masterkey.yaml
  - sealed-zitadel-db-credentials.yaml
  - postgres.yaml
  - helmrelease.yaml
# The two sealed-*.yaml files are created during bootstrap by
# scripts/seal-zitadel-secrets.sh — see SECRETS.md. Until they are
# committed, the `zitadel` Flux Kustomization fails on purpose while the
# rest of the substrate stays healthy.
